<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <style>
        *{
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body{
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator{
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #display{
            width: 100%;
            height: 70px;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
            text-align: right;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #2d2d2d;
            color: #00ff88;
            outline: none;
        }

        .buttons{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button{
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #3a3a3a;
            color: white;
            transition: all 0.2s;
        }

        button:hover{
            background: #555;
            transform: scale(1.05);
        }

        button:active{
            transform: scale(0.95);
        }

        /* Operator buttons */
        button:nth-child(1), button:nth-child(2), button:nth-child(3), button:nth-child(4),
        button:nth-child(8), button:nth-child(12), button:nth-child(16){
            background: #ff6b6b;
            color: white;
        }
        button:nth-child(1):hover, button:nth-child(2):hover, button:nth-child(3):hover, button:nth-child(4):hover,
        button:nth-child(8):hover, button:nth-child(12):hover, button:nth-child(16):hover{
            background: #ff8787;
        }

        /* = button */
        button.equals{
            grid-column: span 2;
            background: #00ff88;
            color: #1e1e1e;
        }

        button.equals:hover{
            background: #00cc6a;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">*</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="equals">=</button>
        </div>
    </div>

<script>
    const display = document.getElementById("display");

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function deleteLast(){
        display.value = display.value.slice(0, -1);
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
            setTimeout(() => { display.value = ""; }, 1000);
        }
    }

    // Keyboard support bhi add kar diya
    document.addEventListener('keydown', (e) => {
        if(e.key >= '0' && e.key <= '9' || ['+', '-', '*', '/', '.', '%'].includes(e.key)){
            appendValue(e.key);
        }
        else if(e.key === 'Enter'){
            calculate();
        }
        else if(e.key === 'Backspace'){
            deleteLast();
        }
        else if(e.key === 'Escape'){
            clearDisplay();
        }
    });
</script>
</body>
</html>
